name: blast_net
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Portable environment based on the current `pytorch_env` package set.
  # This intentionally avoids platform-specific build strings and omits
  # low-level runtime libraries so it can solve on macOS, Linux, and Windows.
  - python=3.8
  - pip
  - numpy=1.24.4
  - scipy=1.10.1
  - pandas=2.0.3
  - matplotlib=3.7.3
  - ipython=8.12.2
  - pyyaml=6.0.2
  - requests=2.32.3
  - lxml=4.9.3
  - h5py=3.11.0
  - obspy=1.4.1
  - pyasdf=0.8.2
  - configobj=5.0.9
  - mpi4py=4.1.1
  - scikit-learn=1.3.1
  - cartopy=0.21.1
  - pyproj=3.5.0
  - shapely=2.0.1
  - pytorch=2.4.1
  - torchvision=0.20.0
  - torchaudio=2.4.1
  - tensorflow=2.12.1
  - dill=0.4.0
  - isodate=0.6.1
  - peakutils=1.3.5
  - prov=2.0.1
  - rdflib=6.3.2
  - colorama=0.4.6
